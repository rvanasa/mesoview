<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0; maximum-scale=1.0; user-scalable=no;"
    />
    <title>Timelapse Recorder</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        /* height: 100vh; */
        background-color: black;
        overflow-x: hidden;
        margin: 0;
      }
      video,
      canvas {
        position: absolute;
        top: 0;
        min-width: 100%;
        max-width: 200%;
        /* max-height: 100%; */
      }
    </style>
  </head>
  <body>
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

    <script>
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const frames = [];

      const captureFps = 2;
      const playbackFps = 30;
      const playbackSeconds = 5;

      const scrubbingFrames = [];
      endScrubbing();

      navigator.mediaDevices
        .getUserMedia({ video: { facingMode: 'environment' } })
        .then((stream) => {
          video.srcObject = stream;
        });

      function captureFrame() {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        if (frames.length >= playbackSeconds * playbackFps) {
          frames.shift();
        }
        const img = new Image();
        img.src = canvas.toDataURL();
        frames.push(img);
      }
      captureFrame();
      setInterval(captureFrame, 1000 / captureFps);

      function drawFrameFromCursor(event) {
        if (!scrubbingFrames || scrubbingFrames.length === 0) return;
        const relativeX = event.screenX - window.screen.width;
        const buffer = rect.width * 0.05;
        const clampedX = Math.max(
          buffer,
          Math.min(rect.width - buffer, relativeX),
        );
        const index = Math.floor(
          ((clampedX - buffer) / (rect.width - 2 * buffer)) *
            (scrubbingFrames.length - 1),
        );
        const img = scrubbingFrames[index];
        if (img && img.complete && img.naturalHeight !== 0) {
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        }
      }

      function startScrubbing(event) {
        canvas.hidden = false;
        scrubbingFrames.length = 0;
        scrubbingFrames.push(...frames);
        drawFrameFromCursor(event);
      }

      function endScrubbing() {
        canvas.hidden = true;
        scrubbingFrames.length = 0;
      }

      document.body.addEventListener('mousedown', startScrubbing);
      document.body.addEventListener('mousemove', drawFrameFromCursor);
      document.body.addEventListener('mouseup', endScrubbing);

      document.body.addEventListener('touchstart', (event) => {
        startScrubbing(event.touches[0]);
      });
      document.body.addEventListener('touchmove', (event) =>
        drawFrameFromCursor(event.touches[0]),
      );
      document.body.addEventListener('touchend', endScrubbing);
    </script>
  </body>
</html>
